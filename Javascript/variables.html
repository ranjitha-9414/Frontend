<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variables in JavaScript</title>
</head>
<body>
    <script>
        var a = 10;
        a = 20;//re - intialze
        var a = 30;//re-declare
        console.log(a);

        //scope -function scope
        function varvari() {
            var name = "Ranjitha";
            console.log(name);
        }
        varvari();

        //scope- let and const - block scope
        if(true) {
            let z = 100;
            console.log(z);
            const pi = 3.14;
            console.log(pi);
        }
        let b = 200;
        b = 300; //re-intialize
        // let b = 400; //re-declare - error
        console.log(b);

        const d = 500;
        // d = 600; //re-intialize - error
        // const d = 700; //re-declare - error
        console.log(d);

    </script>
</body>
</html>
