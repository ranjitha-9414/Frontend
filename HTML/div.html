<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div Tag</title>
</head>
<body>
    <!--<div> is block level element- div,pre,p,h1-h6-->
        <div>Hello</div>
        <div>This is a div element</div>   
        <!--<span> is inline element- span,a,em,i,b,strong,mark,sub,sup,img,u-->

        <span>Welcome to our website</span>

        <p>We are here to <span style="color: red;">help you</span></p>
</body>
</html>
