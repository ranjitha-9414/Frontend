<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia</title>
</head>
<body>
    <h1>Image</h1>
    <!--<img> is a inline element -->
    <img src="/HTML/media/image.jpg" width="40%" height="40%" alt="Nature image not loaded" title="Nature is a beautiful">
     <!--src attribute specifies the path of the image to be displayed-->
     <!--width and height attributes specify the width and height of the image-->
     <!--alt attribute provides alternative text for the image if it cannot be displayed-->
     <!--alt attribute is also used for accessibility purposes such as screen readers for visually impaired users-->
    <img src="/HTML/media/OIP.jpg" width="500px" height="500px" alt="Sinchan image not loaded" title="Sinchin is a japanse cartoon">
    <img src="https://tse4.mm.bing.net/th/id/OIP.owg3tVj2c71DZcTNjVDABAHaKc?pid=Api&P=0&h=180">
    <h2>Kodnest Logo</h2>
    <a href="https://www.kodnest.com" target="_blank">
        <img src="https://tse4.mm.bing.net/th/id/OIP.ZTmaY0gD_sB7ER7hdI5yZAHaCT?pid=Api&P=0&h=180" alt="Kodnest Logo">
    </a >
    <hr>
    <h2>Video</h2>
    <video src="/HTML/media/video.mp4" controls poster="/HTML/media/OIP (1).jpg"></video>
     <!--controls attribute adds video controls such as play, pause, and volume-->
     <!--you can also use <source> element inside <video> to specify multiple video sources for different formats-->
     <!--<video> element also supports attributes like autoplay, loop, muted, etc.-->
    <video src="/HTML/media/VID-20260308-WA0003.mp4" controls autoplay ></video><br>
     <!--autoplay attribute makes the video start playing automatically when the page loads-->
     <video src="/HTML/media/VID-20260308-WA0003.mp4" controls muted></video><br>
     <!--muted attribute mutes the audio of the video-->
     <video src="/HTML/media/VID-20260308-WA0003.mp4" controls autoplay muted loop width="50%" height="50%" poster="/HTML/media/cricket.jpg">Indian cricket match

     </video><br>
     <!--loop attribute makes the video play continuously in a loop-->
     <hr>
    
    <h2>Audio</h2>

    <audio src="/HTML/media/audio.mp3" controls></audio>
     <!--controls attribute adds audio controls such as play, pause, and volume-->
     <!--you can also use <source> element inside <audio> to specify multiple audio sources for different formats-->
     <!--<audio> element also supports attributes like autoplay, loop, muted, etc.-->
    <audio src="/HTML/media/audio.mp3" controls autoplay muted loop ></audio><br>
     <!--autoplay attribute makes the audio start playing automatically when the page loads-->  
     <!--muted attribute mutes the audio-->
     <!--loop attribute makes the audio play continuously in a loop--> 
</body>
</html>
