<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Webpage</title>
</head>
<body>
    <h1>Student Registration Form</h1>
    <form action="#" method="post" autocomplete="on">
        <fieldset>
            <br><br>
            <legend>Personal Information</legend>
        
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name"><br>
        <br>
        <label for="mail">Email:</label>
        <input type="email" id="mail" name="email"><br>
        <br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br>
        <br>
        <label for="tel">Phone:</label>
        <input type="tel" id="tel" name="phonenumber" placeholder="10 digit number"><br>
        <br>
        <label for="website">Website:</label>
        <input type="url" id="website" name="url" placeholder="https://example.com"><br>
        <br>
        <label for="course">Search Course:</label>
        <input type="search" id="course" name="course" placeholder="search..."><br>
        <br> 
        </fieldset> 
        <br>
        <fieldset>
            <legend>Other Details</legend>
            <br>
            <label for="age">Age:</label>
            <input type="number" id="age" name="age"><br>
            <br>
            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob"><br>
            <br>
            <label for="time">Preferred Time:</label>
            <input type="time" id="time" name="time"><br>
            <br>
            <label for="meeting">Meeting Date & Time:</label>
            <input type="datetime-local" id="meeting" name="meeting">
            <br>
            <br>
            <label>Gender:</label>
                <label></label><input type="radio" name="gender" value="male">Male</label>
                <label><input type="radio" name="gender" value="female">Female</label>
            </label><br>
            <br>
            <label>Hobbies:</label>
            <label><input type="checkbox" name="hobbies" value="Reading">Reading</label>
            <label><input type="checkbox" name="hobbies" value="Sports">Sports</label><br>
            <br>
            <label for="color">Favorite Color:</label>
            <input type="color" id="color" name="color"><br>
            <br>
            <label for="range">Skill Level:</label>
            <input type="range" id="range" name="level" min="0" max="10" value="5">5<br>
            <br>
        </fieldset>
        <br>
        <fieldset>
            <legend>Selection</legend>
            <label for="tech">Course:</label>
            <select id="tech" name="course" multiple>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="js">JavaScript</option>
            </select><br>
            <br>
            <label for="city">City:</label>
            <input type="text" id="city" name="city"><br>
            <br>
            <label for="photo">Upload Photo:</label>
            <input type="file" id="photo" name="file" accept=".pdf, .png, .jpg, .jpeg"><br>
            <br>
        </fieldset>
        <br>
        <br>
        <fieldset>
            <legend>Comments</legend>
            
            <textarea id="comments" name="comments" rows="5" cols="50" placeholder="write your comments.."></textarea>
        </fieldset>
        <br>
        <br>
        <button type="submit">Submit</button>
        <button type="reset" value="cancel">Reset</button>
        <button type="button" disbaled>Disabled button</button></button>
    </form>
</body>
</html>
