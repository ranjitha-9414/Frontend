<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor Tag</title>
</head>
<body>
    <h3>Navigate to kodNest</h3>
    <!-- <a> is anchor tag used to link one page to another page or to a specific section of the same page/Clickable text-->
     <!--#,Stays in same page-->
     <a href="#">Hypertext Link</a>   
    <a href="https://www.kodnest.com">Click here to navigate to kodNest</a><!--<a> is an inline element -->
     <br>   
    <a href="https://www.facebook.com">Click here to navigate to Facebook</a>
    <br>
    <!--title attribute provides additional information about the link-->
    <a href="https://www.kodnest.com" title="Training and Placement Institute">Visit KodNest</a>
    <br>
    <!--target attribute specifies where to open the linked document-->
     <a href="https://www.kodnest.com" target="_self">Visit KodNest in same tab</a>
     <br>
     <!--_self is default value, it opens the linked document in the same tab as it was clicked-->
     <a href="https://www.kodnest.com" target="_blank">Visit KodNest in new tab</a>
     <br>
     <!--_blank opens the linked document in a new tab or window-->
     <a href="https://www.kodnest.com" target="_parent">Visit KodNest in parent frame</a>
     <br>
     <!--_parent opens the linked document in the parent frame, if the current document is inside an iframe-->
     <a href="https://www.kodnest.com" target="_top">Visit KodNest in full body of the window</a>
     <br>
        <!--_top opens the linked document in the full body of the window, it removes all frames-->
    <!-- in href you can give any resources not only url-->
     <a href="div.html" title="division Tag" target="_blank">Visit Division Tag</a>
     <br>
     <a href="/Desktop/cv.pdf" target="_blank"> Download Certificate</a>
</body>
</html>
