<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragraph</title>
</head>
<body>
    <!--Case 1-->
    <p>Hi</p>
    <p>I am Ranjitha</p>
    <!--Case 2-->
    <p>Hi</p><p>I am Ranjitha</p>
    <!--Case 3-->
    <p>Hi
        I am Ranjitha
    </p>
    <!--Case 4-->
    <p>Hi I am Ranjitha</p>
    <!-- <br> break tag displays content on a new line -->
     <p>Hi <br> I am Ranjitha</p>
     <!-- <pre> preformated text/tag displays content in a fixed-width font and preserves both spaces and line breaks -->
    <pre>  Hi
                I am Ranjitha
    </pre>
</body>
</html>
