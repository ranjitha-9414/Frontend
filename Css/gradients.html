<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradients</title>
    <style>
        #lg {
            height:300px;
            width:100%;
            background-color:red;
            /*background:linear-gradient(red,yellow);/*top to bottom*/
           /* background: linear-gradient(to right ,red,yellow,green);/*left to right*/
          /* background: linear-gradient(45deg,red,yellow,green);/*diagonally*/
          background:linear-gradient(to right, red 30%,yellow 50%, green 100%);

        }
        #rg {
            height:300px;
            width:500px;
            background-color: green;
           /* background: radial-gradient(green,yellow); */
          /* background: radial-gradient(circle,green,yellow,white,red);/*circle shape*/
          /* background: radial-gradient(ellipse,green,yellow,white,red);/*ellipse shape*/
         /* background: radial-gradient(circle at 50% 50%,green,yellow,white,red);/*circle shape at center*/
         background: radial-gradient(circle at top left,green 30%,yellow 50%,white 70%,red 100%);/*circle shape at center with color stops*/
        }
        #cg {
            height:500px;
            width:500px;
            background-color:blue;
            border-radius: 50%;/*circle*/
           /* background: conic-gradient(blue,yellow,green,red);/*conical gradient*/
          /* background: conic-gradient(from 90deg at 50% 50%,blue 30%,yellow 50%,green 70%,red 100%);/*conical gradient with color stops*/
          background: conic-gradient(red 0deg 90deg,blue 90deg 180deg,green 180deg 270deg,yellow 270deg 360deg);/*conical gradient with color stops and angles*/

        }
    </style>
</head>
<body>
    <h1>Linear Gradient</h1>
    <div id="lg">

    </div>
    <h1>Radial Gradient</h1>
    <div id="rg"></div>
    <h1>Conical Gradient</h1>
    <div id="cg"></div>
</body>
</html>
