<html>
<head>
<style>
.container {
  position: relative;
}

.black-box {
  position: relative;
  z-index: 2;
  background-color: black;
  border: 2px solid black;
  height: 100px;
  margin: 30px;
  color:white;
}

.gray-box {
  position: absolute;
  z-index: 3;
  background: rgba(211, 211, 211, 0.618);
  height: 60px;
  width: 70%;
  left: 50px;
  top: 50px;
  color: white;
}

.green-box {
  position: absolute;
  z-index: 1;
  background: lightgreen;
  width: 35%;
  left: 270px;
  top: -15px;
  height: 100px;
}
</style>
</head>
<body>

<div class="container">
  <div class="black-box">Black box</div>
  <div class="gray-box">Gray box</div>
  <div class="green-box">Green box</div>
</div>

</body>
</html>
